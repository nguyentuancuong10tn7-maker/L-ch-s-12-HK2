<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Lịch Sử</title>
<style>

/* Body */
body {
  font-family: 'Arial', sans-serif;
  text-align: center;
  background: linear-gradient(135deg, #8B0000, #cc0000, #FFD700);
  background-size: 400% 400%;
  animation: bgMove 6s ease infinite;
  transition: background 1s;
  min-height: 100vh;
  margin: 0;
  padding-bottom: 100px;
}

@keyframes bgMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Tiêu đề */
h1 {
  color: #FFD700;
  animation: titleGlow 2s ease-in-out infinite alternate;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
}

@keyframes titleGlow {
  from { text-shadow: 0 0 10px #da020a, 0 0 20px #da020a; color: #FFD700; }
  to { text-shadow: 0 0 10px #FFD700, 0 0 30px #FFD700; color: #ffffff; }
}

/* Quiz box */
#quiz {
  width: 90%;
  max-width: 650px;
  margin: 30px auto;
  background: rgba(255,255,255,0.92);
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

/* Đáp án */
.option {
  display: block;
  margin: 10px auto;
  padding: 12px;
  border: 2px solid #cc0000;
  border-radius: 8px;
  cursor: pointer;
  width: 90%;
  background: white;
  transition: all 0.3s;
  font-size: 16px;
}

.option:hover {
  background: #fff3e0;
  border-color: #FFD700;
  transform: scale(1.02);
}

/* Timer */
#timer {
  font-size: 24px;
  color: #cc0000;
  font-weight: bold;
}

/* Nút */
button {
  margin: 5px;
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  background: #cc0000;
  color: white;
  font-size: 15px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #FFD700;
  color: #8B0000;
  transform: scale(1.05);
}

/* Nút điều khiển góc trên */
#controls {
  position: fixed;
  top: 15px;
  right: 15px;
  display: flex;
  gap: 10px;
  z-index: 1000;
}

#controls button {
  padding: 8px 14px;
  font-size: 14px;
  border-radius: 20px;
  background: rgba(0,0,0,0.5);
  color: white;
  border: none;
  cursor: pointer;
  transition: 0.3s;
}

#controls button:hover {
  background: #FFD700;
  color: #8B0000;
}

/* Thanh trạng thái - dưới cùng */
#statusBars {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(0,0,0,0.88);
  padding: 8px 12px;
  color: white;
  font-size: 12px;
  z-index: 999;
  display: none;
}

#barRow {
  display: flex;
  gap: 12px;
  align-items: center;
  justify-content: center;
  margin-bottom: 6px;
}

#barRow > div {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
  max-width: 220px;
}

@media (max-width: 600px) {
  #quiz { width: 95%; padding: 12px; margin: 10px auto; }
  h1 { font-size: 20px; }
  .option { font-size: 14px; padding: 10px; }
  #helpBtns button { font-size: 10px; padding: 4px 7px; }
  #controls { top: 8px; right: 8px; gap: 4px; }
  #controls button { font-size: 11px; padding: 5px 8px; }
  #timer { font-size: 20px; }
}

.barWrap {
  flex: 1;
  height: 10px;
  border-radius: 10px;
  background: #333;
  overflow: hidden;
}

.barFill {
  height: 100%;
  border-radius: 10px;
  transition: width 0.5s, background 0.5s;
}

#fearBarFill { background: #00cc00; }
#watchBarFill { background: #ffff00; }

#helpBtns {
  display: flex;
  gap: 6px;
  justify-content: center;
  overflow-x: auto;
  padding: 2px 0;
}

#helpBtns button {
  padding: 5px 8px;
  font-size: 11px;
  border-radius: 8px;
  background: rgba(255,255,255,0.15);
  color: white;
  border: 1px solid rgba(255,255,255,0.3);
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  margin: 0;
}

#helpBtns button:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}

/* Nút trợ giúp */
#helpBtns {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 8px;
}

#helpBtns button {
  padding: 5px 8px;
  font-size: 12px;
  border-radius: 8px;
  background: rgba(255,255,255,0.15);
  color: white;
  border: 1px solid rgba(255,255,255,0.3);
  cursor: pointer;
  transition: 0.3s;
  margin: 0;
}

#helpBtns button:hover {
  background: rgba(255,255,255,0.3);
  transform: scale(1.05);
  color: white;
}

#helpBtns button:disabled {
  opacity: 0.35;
  cursor: not-allowed;
  transform: none;
}

/* Animation thưởng */
@keyframes fadeOut {
  0% { opacity:1; transform:translateX(-50%) translateY(0); }
  100% { opacity:0; transform:translateX(-50%) translateY(-30px); }
}

/* Popup thông báo trong trang */
#msgBox {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.92);
  color: white;
  padding: 20px 25px;
  border-radius: 16px;
  font-size: 15px;
  z-index: 9999;
  max-width: 85%;
  text-align: center;
  line-height: 1.6;
  box-shadow: 0 0 30px rgba(0,0,0,0.5);
}

#msgBox button {
  margin-top: 12px;
  background: #FFD700;
  color: #8B0000;
  border: none;
  padding: 8px 20px;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
}

#msgOverlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.4);
  z-index: 9998;
}

/* Bong bóng nghe lỏm */
#whisperBubble {
  position: fixed;
  bottom: 110px;
  left: 15px;
  background: rgba(30,30,30,0.92);
  color: white;
  padding: 10px 15px;
  border-radius: 15px 15px 15px 0;
  font-size: 13px;
  max-width: 200px;
  z-index: 998;
  display: none;
  animation: popIn 0.3s ease;
  border: 1px solid rgba(255,255,255,0.15);
}

@keyframes popIn {
  from { opacity:0; transform:scale(0.8) translateY(10px); }
  to { opacity:1; transform:scale(1) translateY(0); }
}

/* Streak */
#streakBox {
  position: fixed;
  top: 60px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,100,0,0.92);
  color: white;
  padding: 5px 18px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: bold;
  z-index: 1000;
  display: none;
}

/* Timer tổng */
#totalTimer {
  font-size: 12px;
  color: rgba(255,255,255,0.6);
  margin-top: 2px;
  text-align: center;
}

@keyframes confettiFall {
  to { transform: translateY(110vh) rotate(720deg); opacity:0; }
}

</style>

<body>

<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- Popup thông báo -->
<div id="msgOverlay" onclick="closeMsg()"></div>
<div id="msgBox">
  <div id="msgText"></div>
  <button onclick="closeMsg()">OK</button>
</div>

<!-- Bong bóng nghe lỏm -->
<div id="whisperBubble"></div>

<!-- Streak -->
<div id="streakBox"></div>

<!-- Nút điều khiển -->
<div id="controls">
  <button onclick="toggleMusic()">🔊 Tắt nhạc</button>
  <button onclick="changeBg()">🎨 Đổi nền</button>
</div>

<!-- Thanh trạng thái + trợ giúp -->
<div id="statusBars">
  <div id="barRow">
    <div>😱 <span id="fearNum">50</span>/100 <div class="barWrap"><div class="barFill" id="fearBarFill" style="width:50%"></div></div></div>
    <div>👀 <span id="watchNum">0</span>/100 <div class="barWrap"><div class="barFill" id="watchBarFill" style="width:0%"></div></div></div>
  </div>
  <div id="helpBtns">
    <button id="btnTeacher" onclick="askTeacher()">😰 Hỏi thầy</button>
    <button id="btnPhao" onclick="usePhao()">📜 Lật phao</button>
    <button id="btnAI" onclick="askAI()">🤖 Hỏi AI</button>
    <button id="btnCopy" onclick="quayCop()">👀 Quay cóp</button>
    <button id="btnNeighbor" onclick="askNeighbor()">🧑 Kế bên</button>
  </div>
</div>

<h1>Quiz Lịch Sử Việt Nam</h1>

<!-- Màn hình bắt đầu -->
<div id="start">
  <input id="player" placeholder="Nhập tên của bạn">
  <br><br>
  <p style="color:white; font-size:16px; margin-bottom:8px">Chọn độ khó:</p>
  <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-bottom:15px">
    <button onclick="selectDiff('easy')" id="btnEasy" style="background:#27ae60; font-size:14px; padding:12px 16px">
      😊 Dễ<br><small>30s | Sai ít bất lợi</small>
    </button>
    <button onclick="selectDiff('medium')" id="btnMedium" style="background:#e67e22; font-size:14px; padding:12px 16px">
      😐 Trung bình<br><small>20s | Bình thường</small>
    </button>
    <button onclick="selectDiff('hard')" id="btnHard" style="background:#c0392b; font-size:14px; padding:12px 16px">
      💀 Try Hard<br><small>15s | Sai 1 = thua!</small>
    </button>
  </div>
  <div id="diffDesc" style="color:white; font-size:13px; margin-bottom:10px; min-height:20px"></div>
  <button onclick="startGame()" id="btnStart" style="background:#FFD700; color:#8B0000; font-size:16px; padding:12px 25px">Bắt đầu</button>
</div>

<!-- Màn hình quiz -->
<div id="quiz" style="display:none">
  <div id="timer">20</div>
  <div id="totalTimer">⏱️ 0:00</div>
  <h2 id="question"></h2>
  <div id="options"></div>
</div>

<!-- Kết quả -->
<div id="resultScreen" style="display:none; margin-top:80px; color:white">
  <h1 id="resultTitle"></h1>
  <h2 id="result"></h2>
  <button onclick="location.reload()">🔄 Chơi lại</button>
</div>

<script>

// ===== CÂU HỎI =====
let questions=[
  // 💌 DỄ
  {q:"💌 Phong trào Đông Du do ai lãnh đạo?",a:["Phan Bội Châu","Phan Châu Trinh","Nguyễn Ái Quốc","Trường Chinh"],c:0},
  {q:"💌 Phong trào Đông Du diễn ra chủ yếu ở nước nào?",a:["Trung Quốc","Nhật Bản","Pháp","Mỹ"],c:1},
  {q:"💌 Phan Châu Trinh hoạt động chủ yếu ở đâu?",a:["Nhật","Pháp","Trung Quốc","Nga"],c:1},
  {q:"💌 Nguyễn Ái Quốc gửi Bản yêu sách của nhân dân An Nam năm nào?",a:["1918","1919","1920","1921"],c:1},
  {q:"💌 Nguyễn Ái Quốc đọc Luận cương của Lênin năm nào?",a:["1919","1920","1921","1922"],c:1},
  {q:"💌 Đảng Cộng sản Pháp được Nguyễn Ái Quốc tham gia sáng lập năm nào?",a:["1919","1920","1921","1922"],c:1},
  {q:"💌 Nguyễn Ái Quốc đến Liên Xô năm nào?",a:["1922","1923","1924","1925"],c:1},
  {q:"💌 Hội Việt Nam Cách mạng Thanh niên thành lập năm?",a:["1923","1924","1925","1926"],c:2},
  {q:"💌 Nguyễn Ái Quốc về nước năm nào?",a:["1940","1941","1942","1943"],c:1},
  {q:"💌 Cách mạng tháng Tám thành công năm?",a:["1943","1944","1945","1946"],c:2},
  {q:"💌 Hiệp định Genève ký năm?",a:["1953","1954","1955","1956"],c:1},
  {q:"💌 Hiệp định Paris ký năm?",a:["1971","1972","1973","1974"],c:2},
  {q:"💌 Việt Nam gia nhập Liên Hợp Quốc năm?",a:["1975","1976","1977","1978"],c:2},
  {q:"💌 Việt Nam gia nhập ASEAN năm?",a:["1993","1994","1995","1996"],c:2},
  {q:"💌 Nguyễn Ái Quốc rời Bến Nhà Rồng năm?",a:["1910","1911","1912","1913"],c:1},
  {q:"💌 Tên thật của Hồ Chí Minh là?",a:["Nguyễn Sinh Cung","Nguyễn Ái Quốc","Nguyễn Tất Thành","Hồ Chí Minh"],c:0},
  {q:"💌 Hồ Chí Minh sinh năm?",a:["1889","1890","1891","1892"],c:1},
  {q:"💌 Hồ Chí Minh đọc Tuyên ngôn độc lập ngày?",a:["1/9/1945","2/9/1945","3/9/1945","4/9/1945"],c:1},
  {q:"💌 Việt Minh thành lập năm?",a:["1940","1941","1942","1943"],c:1},
  {q:"💌 Đảng Cộng sản Việt Nam thành lập năm?",a:["1929","1930","1931","1932"],c:1},
  {q:"💌 Chủ tịch Hồ Chí Minh mất năm?",a:["1967","1968","1969","1970"],c:2},
  {q:"💌 Nguyễn Ái Quốc lấy tên Hồ Chí Minh năm?",a:["1940","1941","1942","1943"],c:2},
  {q:"💌 Việt Nam bình thường hóa quan hệ với Mỹ năm?",a:["1993","1994","1995","1996"],c:2},
  {q:"💌 Nguyễn Ái Quốc đọc Luận cương của ai?",a:["Mác","Lênin","Stalin","Trotsky"],c:1},
  {q:"💌 Hội nghị hợp nhất Đảng diễn ra ở?",a:["Bắc Kinh","Hồng Kông","Quảng Châu","Paris"],c:1},
  {q:"💌 Ngoại giao giúp bảo vệ điều gì quan trọng nhất?",a:["Chủ quyền","Tiền","Nhà","Xe"],c:0},
  {q:"💌 ASEAN giúp Việt Nam điều gì?",a:["Hợp tác kinh tế","Đánh nhau","Cấm vận","Không tác dụng"],c:0},
  {q:"💌 Hội nhập quốc tế giúp sinh viên điều gì?",a:["Cơ hội học tập","Không có gì","Chiến tranh","Bị hạn chế"],c:0},
  {q:"💌 Vai trò lớn nhất của Hồ Chí Minh là gì?",a:["Lãnh đạo cách mạng","Làm kinh tế","Xây nhà","Phát minh"],c:0},
  {q:"💌 Ngoại giao giúp giải quyết tranh chấp bằng cách nào?",a:["Hòa bình","Chiến tranh","Bạo lực","Không giải quyết"],c:0},

  // 👀 TRUNG BÌNH
  {q:"👀 Hiệp định Sơ bộ Việt - Pháp ký ngày?",a:["6/3/1946","2/9/1945","19/12/1946","7/5/1954"],c:0},
  {q:"👀 Vì sao Nguyễn Ái Quốc chọn con đường cách mạng vô sản?",a:["Do Lênin chỉ ra con đường giải phóng dân tộc","Do Pháp gợi ý","Do Nhật giúp","Do Trung Quốc giúp"],c:0},
  {q:"👀 Ý nghĩa lớn nhất của việc tìm ra con đường cứu nước là?",a:["Giải quyết khủng hoảng đường lối","Được nhiều tiền","Được nổi tiếng","Có thêm đồng minh"],c:0},
  {q:"👀 Vì sao phong trào Đông Du thất bại?",a:["Nhật trục xuất du học sinh","Thiếu tiền","Không có lãnh đạo","Do dân không ủng hộ"],c:0},
  {q:"👀 Mục tiêu của Phan Châu Trinh là gì?",a:["Cải cách đất nước","Đánh Pháp bằng vũ lực","Theo Nhật","Theo Mỹ"],c:0},
  {q:"👀 Điểm khác nhau giữa Phan Bội Châu và Phan Châu Trinh?",a:["Một người bạo động một người cải cách","Cả hai giống nhau","Đều theo Nhật","Đều theo Pháp"],c:0},
  {q:"👀 Ý nghĩa của Hiệp định Genève?",a:["Chấm dứt chiến tranh Đông Dương","Chia đất nước","Mỹ thắng","Pháp thắng"],c:0},
  {q:"👀 Hiệp định Paris có ý nghĩa gì?",a:["Mỹ rút quân","Pháp quay lại","Việt Nam chia đôi","Chiến tranh tiếp tục"],c:0},
  {q:"👀 Nguyễn Ái Quốc hoạt động ở Quảng Châu năm nào?",a:["1923","1924","1925","1926"],c:2},
  {q:"👀 Việt Nam Quang phục hội thành lập năm nào?",a:["1910","1911","1912","1913"],c:2},
  {q:"👀 Phong trào Đông Du kết thúc năm nào?",a:["1907","1908","1909","1910"],c:1},
  {q:"👀 Phan Châu Trinh sang Pháp năm nào?",a:["1910","1911","1912","1913"],c:1},
  {q:"👀 Nếu không có Nguyễn Ái Quốc tìm ra con đường cách mạng?",a:["Phong trào có thể bế tắc lâu hơn","Việt Nam giàu hơn","Chiến tranh ít hơn","Không thay đổi"],c:0},
  {q:"👀 Nếu không có đối ngoại trong kháng chiến?",a:["Việt Nam khó thắng","Việt Nam mạnh hơn","Không ảnh hưởng","Chiến tranh nhanh"],c:0},
  {q:"👀 Nếu Việt Nam không hội nhập quốc tế?",a:["Kinh tế chậm phát triển","Giàu hơn","Không đổi","Chiến tranh"],c:0},
  {q:"👀 Vai trò của đối ngoại trong chiến tranh là gì?",a:["Tìm sự ủng hộ quốc tế","Chỉ để giao lưu","Chỉ để buôn bán","Không quan trọng"],c:0},
  {q:"👀 Vì sao phải thành lập Đảng Cộng sản?",a:["Lãnh đạo cách mạng","Có thêm tiền","Có thêm quân","Để nổi tiếng"],c:0},
  {q:"👀 Bài học lớn nhất từ đối ngoại Việt Nam là gì?",a:["Hợp tác quốc tế quan trọng","Không cần bạn bè","Chỉ tự lực","Đóng cửa"],c:0},
  {q:"👀 Tại sao Nguyễn Ái Quốc gửi yêu sách năm 1919?",a:["Đòi quyền tự do dân chủ","Xin viện trợ","Xin độc lập ngay","Xin làm thuộc địa"],c:0},
  {q:"👀 Hội nhập giúp Việt Nam điều gì quan trọng nhất?",a:["Phát triển kinh tế","Cô lập","Chiến tranh","Không có gì"],c:0},

  // ⚠️ SIÊU KHÓ
  {q:"⚠️ Tại HN hợp nhất 2/1930, tên ban đầu của Đảng là gì trước khi đổi theo chỉ thị Quốc tế Cộng sản?",a:["Đảng Cộng sản Đông Dương","Đảng Cộng sản Việt Nam","An Nam Cộng sản Đảng","Đông Dương Cộng sản Đảng"],c:1},
  {q:"⚠️ Nguyễn Ái Quốc gửi Bản yêu sách tới Hội nghị Versailles nhân danh tổ chức nào?",a:["Hội Việt Nam Cách mạng Thanh niên","Nhóm người Việt Nam yêu nước tại Pháp","Đảng Xã hội Pháp","Quốc tế Cộng sản"],c:1},
  {q:"⚠️ Luận cương dân tộc và thuộc địa của Lênin được đăng trên tờ báo nào mà Nguyễn Ái Quốc đọc được?",a:["Nhân Đạo","Pravda","Tia Sáng","Đời sống thợ thuyền"],c:0},
  {q:"⚠️ Hội Việt Nam Cách mạng Thanh niên tiền thân là tổ chức nào?",a:["Tâm Tâm Xã","Việt Nam Quang phục hội","Đông Dương Cộng sản Đảng","Hội Phục Việt"],c:0},

// ===== BIẾN GAME =====
let current = 0
let score = 0
let wrong = 0
let time = 20
let timer
let fear = 50
let watch = 0

// ===== TÍNH NĂNG MỚI =====
let streak = 0
let totalSeconds = 0
let totalTimerInterval
let fastAnswerCount = 0
let hardModeForced = 0
let neighborTrust = true // đứa kế bên có tin mình không
let answerStartTime = 0
let nextWhisper = Math.floor(Math.random()*3)+3
let nextNeighborAsk = Math.floor(Math.random()*3)+4
let hardQuestions = [] // câu hỏi siêu khó để dồn ép

// ===== ĐỘ KHÓ =====
let difficulty = 'medium'
let diffSettings = {
  easy:   { time: 30, bonusTime: 8,  penaltyTime: 2, fearPlus: 10, watchPlus: 3,  oneStrike: false, cheatCatch: false },
  medium: { time: 20, bonusTime: 5,  penaltyTime: 3, fearPlus: 15, watchPlus: 5,  oneStrike: false, cheatCatch: false },
  hard:   { time: 15, bonusTime: 3,  penaltyTime: 5, fearPlus: 25, watchPlus: 10, oneStrike: true,  cheatCatch: true  }
}

function selectDiff(d){
  difficulty = d
  document.getElementById("btnEasy").style.outline = "none"
  document.getElementById("btnMedium").style.outline = "none"
  document.getElementById("btnHard").style.outline = "none"
  document.getElementById("btn" + d.charAt(0).toUpperCase() + d.slice(1)).style.outline = "3px solid white"

  let desc = {
    easy:   "😊 Thời gian 30s | +8s đúng | -2s sai | Ít bất lợi",
    medium: "😐 Thời gian 20s | +5s đúng | -3s sai | Bình thường",
    hard:   "💀 Thời gian 15s | +3s đúng | -5s sai | Sai 1 lần = THUA | Gian lận 100% bị bắt!"
  }
  document.getElementById("diffDesc").innerText = desc[d]
}

// ===== THANH TRẠNG THÁI =====
function updateBars(){
  fear = Math.max(0, Math.min(100, fear))
  watch = Math.max(0, Math.min(100, watch))

  document.getElementById("fearNum").innerText = fear
  document.getElementById("watchNum").innerText = watch
  document.getElementById("fearBarFill").style.width = fear + "%"
  document.getElementById("watchBarFill").style.width = watch + "%"

  document.getElementById("fearBarFill").style.background =
    fear > 70 ? "#ff0000" : fear > 40 ? "#ff9900" : "#00cc00"
  document.getElementById("watchBarFill").style.background =
    watch > 70 ? "#ff0000" : watch > 40 ? "#ff9900" : "#ffff00"

  // Nút hỏi thầy chỉ bật khi sợ = 0
  let btnT = document.getElementById("btnTeacher")
  btnT.style.opacity = fear == 0 ? "1" : "0.4"
  btnT.disabled = fear != 0

  // Thua nếu độ để ý = 100
  if(watch >= 100){
    clearInterval(timer)
    setTimeout(() => {
      showMsg("💀 Thầy cô phát hiện bạn gian lận!\nBị đánh dấu bài - THUA LUÔN!", () => endGame())
    }, 300)
  }
}

function changeFear(v){ fear += v; updateBars() }
function changeWatch(v){ watch += v; updateBars() }

// ===== NHẠC =====
var isUserMuted = false

document.addEventListener("click", function(e){
  if(e.target.closest("#controls")) return
  var music = document.getElementById("bgMusic")
  if(music.paused && !isUserMuted) music.play()
})

function toggleMusic(){
  var music = document.getElementById("bgMusic")
  var btn = document.querySelector("#controls button")
  if(!music.paused){
    music.pause(); isUserMuted = true; btn.innerText = "🔇 Bật nhạc"
  } else {
    music.play(); isUserMuted = false; btn.innerText = "🔊 Tắt nhạc"
  }
}

// ===== ĐỔI NỀN =====
var backgrounds = [
  "linear-gradient(135deg, #8B0000, #cc0000, #FFD700)",
  "linear-gradient(135deg, #1a1a2e, #16213e, #0f3460)",
  "linear-gradient(135deg, #134e5e, #71b280)",
  "linear-gradient(135deg, #f8b500, #fc5c7d)",
]
var bgIndex = 0
function changeBg(){
  bgIndex = (bgIndex + 1) % backgrounds.length
  document.body.style.background = backgrounds[bgIndex]
  document.body.style.backgroundSize = "400% 400%"
}

// ===== GAME =====
function startGame(){
  let cfg = diffSettings[difficulty]
  time = cfg.time

  // Tách câu siêu khó ra riêng
  hardQuestions = questions.filter(q => q.q.startsWith("⚠️"))
  questions.sort(() => Math.random() - 0.5)

  document.getElementById("start").style.display = "none"
  document.getElementById("quiz").style.display = "block"
  document.getElementById("statusBars").style.cssText = "display:flex; flex-direction:column;"

  if(difficulty === 'hard') watch = 0

  // Bắt đầu đồng hồ tổng
  totalSeconds = 0
  totalTimerInterval = setInterval(() => {
    totalSeconds++
    let m = Math.floor(totalSeconds/60)
    let s = totalSeconds % 60
    document.getElementById("totalTimer").innerText = `⏱️ ${m}:${s<10?'0'+s:s}`
  }, 1000)

  updateBars()
  loadQuestion()
}

function loadQuestion(){
  let cfg = diffSettings[difficulty]
  time = cfg.time
  answerStartTime = Date.now()

  // Anti học vẹt: nếu trả lời nhanh 10 câu liên tiếp → dồn câu khó
  let q
  if(hardModeForced > 0 && hardQuestions.length > 0){
    q = hardQuestions[Math.floor(Math.random() * hardQuestions.length)]
    hardModeForced--
  } else {
    q = questions[current]
  }

  let answers = [...q.a]
  answers.sort(() => Math.random() - 0.5)

  let options = ""
  answers.forEach(opt => {
    let isCorrect = (opt === q.a[q.c])
    options += `<div class="option" onclick="answer(${isCorrect}, '${q.a[q.c]}')">${opt}</div>`
  })

  document.getElementById("question").innerText = q.q
  document.getElementById("options").innerHTML = options

  // Nghe lỏm random mỗi 3-5 câu
  nextWhisper--
  if(nextWhisper <= 0){
    nextWhisper = Math.floor(Math.random()*3)+3
    setTimeout(() => showWhisper(q), 1500)
  }

  // Đứa kế bên hỏi mình random mỗi 4-6 câu
  nextNeighborAsk--
  if(nextNeighborAsk <= 0){
    nextNeighborAsk = Math.floor(Math.random()*3)+4
    setTimeout(() => neighborAsksMe(q), 800)
  }

  startTimer()
}

// ===== NGHE LỎM =====
let whisperMsgs = [
  "câu này là",
  "tao chắc chắn là",
  "mày chọn đi, là",
  "tao vừa tra ra rồi, là",
  "bàn trên nói là",
  "đứa giỏi nhất lớp chọn",
]

function showWhisper(q){
  let isCorrect = Math.random() < 0.1 // 10% đúng
  let ans
  if(isCorrect){
    ans = q.a[q.c]
  } else {
    let wrongArr = q.a.filter((_, i) => i !== q.c)
    ans = wrongArr[Math.floor(Math.random()*wrongArr.length)]
  }

  let msg = whisperMsgs[Math.floor(Math.random()*whisperMsgs.length)]
  let names = ["Đứa bàn bên", "Thằng sau lưng", "Con ngồi cạnh", "Mấy đứa bàn trên"]
  let name = names[Math.floor(Math.random()*names.length)]

  let bubble = document.getElementById("whisperBubble")
  bubble.innerHTML = `🗣️ <b>${name}:</b><br>"${msg} <b>${ans}</b>..."`
  bubble.style.display = "block"

  setTimeout(() => { bubble.style.display = "none" }, 5000)
}

// ===== ĐỨA KẾ BÊN HỎI MÌNH =====
function neighborAsksMe(q){
  // Hỏi mình 1 câu ngẫu nhiên từ bộ câu hỏi
  let askQ = questions[Math.floor(Math.random()*questions.length)]
  showMsg(
    `🧑‍🤝‍🧑 Đứa kế bên hỏi bạn:\n\n"${askQ.q}\n\nMày biết không?"\n\nBạn trả lời gì?`,
    null,
    [askQ.a[askQ.c], askQ.a.find((_, i) => i !== askQ.c)],
    askQ.a[askQ.c]
  )
}

function answerNeighbor(chosen, correct){
  closeMsg()
  if(chosen === correct){
    neighborTrust = true
    changeWatch(-10)
    showToast("🧑‍🤝‍🧑 Bạn trả lời đúng! Đứa kế bên tin tưởng bạn hơn!\n-10 độ để ý 👀", "#4CAF50")
  } else {
    neighborTrust = false
    changeWatch(+5)
    showToast("🧑‍🤝‍🧑 Bạn trả lời sai! Đứa kế bên không tin bạn nữa!\n+5 độ để ý 👀", "#cc0000")
  }
}

// ===== STREAK =====
function updateStreak(correct){
  if(correct){
    streak++
    if(streak >= 5){
      document.getElementById("streakBox").style.display = "block"
      document.getElementById("streakBox").innerText = `⚡ ${streak} câu liên tiếp! Bất khả chiến bại!`
    } else if(streak >= 3){
      document.getElementById("streakBox").style.display = "block"
      document.getElementById("streakBox").innerText = `🔥 ${streak} câu liên tiếp! Đang nóng!`
    }
  } else {
    streak = 0
    document.getElementById("streakBox").style.display = "none"
  }
}

// ===== TOAST THÔNG BÁO NHỎ =====
function showToast(text, color){
  let toast = document.createElement("div")
  toast.innerText = text
  toast.style.cssText = `
    position:fixed; top:20px; left:50%;
    transform:translateX(-50%);
    background:${color || '#333'}; color:white;
    padding:10px 20px; border-radius:20px;
    font-size:15px; font-weight:bold;
    z-index:9999; animation: fadeOut 2s forwards;
    text-align:center; max-width:80%;
  `
  document.body.appendChild(toast)
  setTimeout(() => toast.remove(), 2000)
}

// ===== CONFETTI =====
function showConfetti(){
  let colors = ["#FFD700","#cc0000","#4CAF50","#2196F3","#ff69b4","#ff9900"]
  for(let i=0; i<80; i++){
    let c = document.createElement("div")
    c.style.cssText = `
      position:fixed;
      left:${Math.random()*100}vw;
      top:-10px;
      width:${Math.random()*10+5}px;
      height:${Math.random()*10+5}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${Math.random()>0.5?"50%":"0"};
      z-index:9999;
      animation: confettiFall ${Math.random()*2+2}s linear forwards;
      opacity:${Math.random()*0.7+0.3};
    `
    document.body.appendChild(c)
    setTimeout(() => c.remove(), 4000)
  }
}



function startTimer(){
  clearInterval(timer)
  timer = setInterval(() => {
    time--
    document.getElementById("timer").innerText = time
    if(time <= 0){
      clearInterval(timer)
      changeFear(+20)
      changeWatch(+5)
      gameOver()
    }
  }, 1000)
}

function answer(correct, correctAns){
  let cfg = diffSettings[difficulty]
  let elapsed = (Date.now() - answerStartTime) / 1000

  // Anti học vẹt: trả lời dưới 3s
  if(elapsed < 3){
    fastAnswerCount++
    if(fastAnswerCount >= 10){
      fastAnswerCount = 0
      hardModeForced = 5
      showToast("Bạn đang trả lời rất nhanh!\nHãy dành thêm thời gian suy nghĩ nhé 🤔", "#e67e22")
    }
  } else {
    fastAnswerCount = 0
  }

  updateStreak(correct)

  if(correct){
    score++
    changeFear(-10)
    changeWatch(-5)

    time = Math.min(time + cfg.bonusTime, cfg.time)
    document.getElementById("timer").innerText = time

    showToast("+" + cfg.bonusTime + " giây! ⏰", "#4CAF50")
    nextQuestion()

  } else {
    wrong++
    changeFear(+cfg.fearPlus)
    changeWatch(+cfg.watchPlus)

    if(cfg.oneStrike){
      let opts = document.querySelectorAll(".option")
      opts.forEach(opt => {
        if(opt.onclick.toString().includes("true")){ opt.style.background = "#4CAF50"; opt.style.color = "white" }
        opt.style.pointerEvents = "none"
      })
      clearInterval(timer)
      setTimeout(() => {
        showMsg("💀 SAI RỒI! Try Hard = Sai 1 lần THUA LUÔN!\n\nĐáp án đúng đã được tô xanh!", () => endGame())
      }, 1000)
      return
    }

    time = Math.max(time - cfg.penaltyTime, 5)
    document.getElementById("timer").innerText = time

    let opts = document.querySelectorAll(".option")
    opts.forEach(opt => {
      if(opt.onclick.toString().includes("true")){ opt.style.background = "#4CAF50"; opt.style.color = "white" }
      opt.style.pointerEvents = "none"
    })

    clearInterval(timer)
    setTimeout(() => nextQuestion(), 2000)
  }
}

function nextQuestion(){
  clearInterval(timer)
  current++
  if(current >= questions.length){
    endGame()
  } else {
    loadQuestion()
  }
}

function gameOver(){
  let opts = document.querySelectorAll(".option")
  opts.forEach(opt => {
    if(opt.onclick.toString().includes("true")){
      opt.style.background = "#4CAF50"
      opt.style.color = "white"
    }
    opt.style.pointerEvents = "none"
  })
  setTimeout(() => {
    showMsg("⏰ Hết giờ! Qua câu tiếp!", () => nextQuestion())
  }, 1500)
}

function endGame(){
  clearInterval(timer)
  clearInterval(totalTimerInterval)
  document.getElementById("quiz").style.display = "none"
  document.getElementById("statusBars").style.display = "none"
  document.getElementById("streakBox").style.display = "none"
  document.getElementById("whisperBubble").style.display = "none"
  document.getElementById("resultScreen").style.display = "block"

  showConfetti()

  let name = document.getElementById("player") ? document.getElementById("player").value || "Bạn" : "Bạn"
  let pct = Math.round(score / questions.length * 100)
  let m = Math.floor(totalSeconds/60)
  let s = totalSeconds % 60
  let timeStr = `${m}:${s<10?'0'+s:s}`

  document.getElementById("resultTitle").innerText =
    pct >= 80 ? "🎉 Xuất sắc!" : pct >= 50 ? "👍 Khá tốt!" : "😅 Cố gắng hơn nhé!"
  let diffLabel = { easy: "😊 Dễ", medium: "😐 Trung bình", hard: "💀 Try Hard" }
  document.getElementById("result").innerHTML =
    `${name} đúng <b>${score}/${questions.length}</b> câu (${pct}%)<br>
     Sai ${wrong} lần | ${diffLabel[difficulty]}<br>
     ⏱️ Thời gian: <b>${timeStr}</b>`
}

// ===== POPUP THÔNG BÁO =====
function showMsg(text, callback, choices, correctChoice){
  document.getElementById("msgText").innerHTML = text.replace(/\n/g, "<br>")

  let box = document.getElementById("msgBox")
  // Xóa nút cũ
  box.querySelectorAll(".neighborBtn").forEach(b => b.remove())

  if(choices && choices.length > 0){
    // Hiện nút chọn đáp án cho đứa kế bên hỏi
    choices.forEach(ch => {
      let btn = document.createElement("button")
      btn.className = "neighborBtn"
      btn.innerText = ch
      btn.style.cssText = "margin:5px; padding:8px 14px; border-radius:8px; background:#555; color:white; border:none; cursor:pointer; font-size:13px;"
      btn.onclick = () => answerNeighbor(ch, correctChoice)
      box.appendChild(btn)
    })
    // Ẩn nút OK
    box.querySelector("button:not(.neighborBtn)").style.display = "none"
  } else {
    box.querySelector("button:not(.neighborBtn)").style.display = "inline-block"
  }

  box.style.display = "block"
  document.getElementById("msgOverlay").style.display = "block"
  window._msgCallback = callback || null
}

function closeMsg(){
  document.getElementById("msgBox").style.display = "none"
  document.getElementById("msgOverlay").style.display = "none"
  if(window._msgCallback){ window._msgCallback(); window._msgCallback = null }
}

// ===== TRỢ GIÚP =====
let helpTeacher = true

// 😰 Hỏi thầy cô (1 lần, cần sợ = 0)
function askTeacher(){
  if(!helpTeacher){ showMsg("Đã dùng rồi! ❌"); return }
  if(fear > 0){ showMsg("😰 Bạn đang sợ quá!\nGiảm nỗi sợ xuống 0 mới dám hỏi thầy!"); return }

  helpTeacher = false
  document.getElementById("btnTeacher").style.opacity = "0.4"
  document.getElementById("btnTeacher").disabled = true

  let rand = Math.random()
  if(rand < 0.8){
    changeFear(+30)
    clearInterval(timer)
    time = Math.max(time - 20, 5)
    document.getElementById("timer").innerText = time
    showMsg("😡 Thầy cô nổi giận:\n\n\"Em đang làm gì vậy?! Tự làm đi!\"\n\n-20 giây ⏰ | +30 nỗi sợ 😱", () => startTimer())
  } else {
    let ans = questions[current].a[questions[current].c]
    showMsg("😊 Thầy cô thì thầm:\n\n\"Lần này thầy giúp, lần sau tự làm!\"\nĐáp án: <b>" + ans + "</b>")
  }
}

// 📜 Lật phao (nhiều lần, +độ để ý)
function usePhao(){
  if(watch >= 80){ showMsg("👀 Thầy cô đang nhìn chằm chằm!\nKhông dám lật phao!"); return }

  // Try Hard: 100% bị bắt
  if(difficulty === 'hard'){
    changeWatch(+100)
    showMsg("💀 Try Hard: Lật phao bị bắt ngay!\nGian lận = THUA LUÔN!")
    return
  }

  let rand = Math.random()
  if(rand < 0.7){
    changeWatch(+20)
    let ans = questions[current].a[questions[current].c]
    showMsg("📜 Lật phao thành công!\n\nĐáp án: <b>" + ans + "</b>\n\n+20 độ để ý 👀")
  } else if(rand < 0.9){
    changeWatch(+50)
    showMsg("💀 Thầy cô bắt được bạn lật phao!\n+50 độ để ý 👀")
  } else {
    changeWatch(+10)
    showMsg("📜 Chữ quá nhỏ không đọc được! 😭\n+10 độ để ý 👀")
  }
}

// 🤖 Hỏi AI (nhiều lần, +độ để ý)
function askAI(){
  if(difficulty === 'hard'){
    changeWatch(+100)
    showMsg("💀 Try Hard: Dùng AI bị phát hiện ngay!\nGian lận = THUA LUÔN!")
    return
  }
  changeWatch(+15)
  let rand = Math.random()
  let ans = questions[current].a[questions[current].c]
  if(rand < 0.9){
    showMsg("🤖 AI trả lời:\n\n\"Theo phân tích của tôi: <b>" + ans + "</b>\"\n\n+15 độ để ý 👀")
  } else {
    let wrongArr = []
    for(let i=0; i<4; i++) if(i != questions[current].c) wrongArr.push(i)
    let wrongAns = questions[current].a[wrongArr[Math.floor(Math.random()*wrongArr.length)]]
    showMsg("🤖 AI bị ảo giác:\n\n\"Theo phân tích của tôi: <b>" + wrongAns + "</b>\"\n(AI đôi khi cũng sai 😅)\n\n+15 độ để ý 👀")
  }
}

// 👀 Quay cóp (nhiều lần, +độ để ý)
function quayCop(){
  if(difficulty === 'hard'){
    changeWatch(+100)
    showMsg("💀 Try Hard: Quay cóp bị bắt ngay!\nGian lận = THUA LUÔN!")
    return
  }
  if(watch >= 60){ showMsg("👀 Thầy cô đang để ý bạn!\nKhông dám quay cóp!"); return }
  let rand = Math.random()
  if(rand < 0.75){
    changeWatch(+25)
    let ans = questions[current].a[questions[current].c]
    showMsg("👀 Quay cóp thành công!\n\nBạn bên cạnh làm: <b>" + ans + "</b>\n+25 độ để ý 👀")
  } else {
    changeWatch(+40)
    showMsg("😱 Bị bắt quay cóp!\n\nThầy cô nhìn thấy hết!\n+40 độ để ý 👀")
  }
}

// 🧑 Hỏi đứa kế bên (nhiều lần, +độ để ý)
function askNeighbor(){
  changeWatch(+10)
  let rand = Math.random()
  let correct = questions[current].c

  // Nếu đứa kế bên không tin mình → 50% bị sai
  let correctChance = neighborTrust ? 0.4 : 0.2

  if(rand < correctChance){
    let ans = questions[current].a[correct]
    showMsg("🧑‍🤝‍🧑 Đứa kế bên thì thầm:\n\n\"Tao nghĩ là: <b>" + ans + "</b>\"\n(Trông tự tin 😏)\n\n+10 độ để ý 👀")
  } else if(rand < 0.8){
    let wrongArr = []
    for(let i=0; i<4; i++) if(i != correct) wrongArr.push(i)
    let wrongAns = questions[current].a[wrongArr[Math.floor(Math.random()*wrongArr.length)]]
    showMsg("🧑‍🤝‍🧑 Đứa kế bên thì thầm:\n\n\"Tao đoán là: <b>" + wrongAns + "</b>\"\n" + (neighborTrust ? "(Trông không chắc 😅)" : "(Nó chưa tha thứ cho bạn 😒)") + "\n\n+10 độ để ý 👀")
  } else {
    showMsg("🧑‍🤝‍🧑 Đứa kế bên thì thầm:\n\n\"Ơ tao cũng không biết 😭\nThôi tự làm đi!\"\n\n+10 độ để ý 👀")
  }
}

</script>
