/* Body */
body {
  font-family: 'Arial', sans-serif;
  text-align: center;
  background: linear-gradient(135deg, #8B0000, #cc0000, #FFD700);
  background-size: 400% 400%;
  animation: bgMove 6s ease infinite;
  transition: background 1s;
  min-height: 100vh;
  margin: 0;
}

@keyframes bgMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Tiêu đề */
h1 {
  color: #FFD700;
  animation: titleGlow 2s ease-in-out infinite alternate;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
}

@keyframes titleGlow {
  from {
    text-shadow: 0 0 10px #da020a, 0 0 20px #da020a;
    color: #FFD700;
  }
  to {
    text-shadow: 0 0 10px #FFD700, 0 0 30px #FFD700;
    color: #ffffff;
  }
}

/* Quiz box */
#quiz {
  width: 700px;
  margin: 30px auto;
  background: rgba(255,255,255,0.92);
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

/* Đáp án */
.option {
  display: block;
  margin: 10px auto;
  padding: 12px;
  border: 2px solid #cc0000;
  border-radius: 8px;
  cursor: pointer;
  width: 90%;
  background: white;
  transition: all 0.3s;
  font-size: 16px;
}

.option:hover {
  background: #fff3e0;
  border-color: #FFD700;
  transform: scale(1.02);
}

/* Timer */
#timer {
  font-size: 24px;
  color: #cc0000;
  font-weight: bold;
}

/* Sai */
#wrong {
  font-size: 18px;
  color: darkred;
}

/* Nút */
button {
  margin: 5px;
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  background: #cc0000;
  color: white;
  font-size: 15px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #FFD700;
  color: #8B0000;
  transform: scale(1.05);
}

/* Nút điều khiển góc trên */
#controls {
  position: fixed;
  top: 15px;
  right: 15px;
  display: flex;
  gap: 10px;
  z-index: 999;
}

#controls button {
  padding: 8px 14px;
  font-size: 14px;
  border-radius: 20px;
  background: rgba(0,0,0,0.5);
  color: white;
  border: none;
  cursor: pointer;
  transition: 0.3s;
}

#controls button:hover {
  background: #FFD700;
  color: #8B0000;
}
</style>

    <!-- Nút điều khiển -->
<div id="controls">
  <button onclick="toggleMusic()">🔊 Tắt nhạc</button>
  <button onclick="changeBg()">🎨 Đổi nền</button>
</div>
<script>
  var isUserMuted = false;

  // Tự phát nhạc khi click (trừ nút tắt nhạc)
  document.addEventListener("click", function(e) {
    if (e.target.closest("#controls")) return; // bỏ qua nút điều khiển
    var music = document.getElementById("bgMusic");
    if (music.paused && !isUserMuted) music.play();
  });

  // Tắt/bật nhạc
  function toggleMusic() {
    var music = document.getElementById("bgMusic");
    var btn = document.querySelector("#controls button");
    if (!music.paused) {
      music.pause();
      isUserMuted = true;
      btn.innerText = "🔇 Bật nhạc";
    } else {
      music.play();
      isUserMuted = false;
      btn.innerText = "🔊 Tắt nhạc";
    }
  }

  // Đổi nền
  var backgrounds = [
    "linear-gradient(135deg, #8B0000, #cc0000, #FFD700)",
    "linear-gradient(135deg, #1a1a2e, #16213e, #0f3460)",
    "linear-gradient(135deg, #134e5e, #71b280)",
    "linear-gradient(135deg, #f8b500, #fc5c7d)",
  ];
  var bgIndex = 0;

  function changeBg() {
    bgIndex = (bgIndex + 1) % backgrounds.length;
    document.body.style.background = backgrounds[bgIndex];
    document.body.style.backgroundSize = "400% 400%";
  }
</script>

let current=0
let score=0
let wrong=0
let time=20
let timer

// trợ giúp 1 lần
let helpAnswer=true
let helpAudience=true
let helpCall=true
let helpSkip=true

function startGame(){

document.getElementById("start").style.display="none"
document.getElementById("quiz").style.display="block"

document.getElementById("bgMusic").play()

loadQuestion()

}

function loadQuestion(){

time=20

let q=questions[current]

let answers=q.a.map((text,i)=>({text,correct:i==q.c}))

answers.sort(()=>Math.random()-0.5)

let options=""

answers.forEach((opt)=>{

options+=`<div class="option" onclick="answer(${opt.correct})">${opt.text}</div>`

})

document.getElementById("question").innerText=q.q

document.getElementById("options").innerHTML=options

startTimer()

}

function startTimer(){

clearInterval(timer)

timer=setInterval(()=>{

time--

document.getElementById("timer").innerText=time

document.body.style.background=
`rgb(${255-time*10},${255-time*10},${255-time*10})`

if(time<=0){

  clearInterval(timer);
  gameOver();


}

},1000)

}

function answer(correct){

if(correct){

score++
document.getElementById("correctSound").play()

}else{

wrong++
document.getElementById("wrongSound").play()

document.getElementById("wrong").innerText="Sai: "+wrong+" / 7"

if(wrong>=7){

alert("Bạn đã sai 7 lần. Game Over!")
endGame()
return

}

}

nextQuestion()

}

function nextQuestion(){

clearInterval(timer)

current++

if(current>=questions.length){

endGame()

}else{

loadQuestion()

}

}

function endGame(){

document.getElementById("quiz").style.display="none"

document.getElementById("result").innerText=
"Bạn đúng "+score+" câu | Sai "+wrong+" lần"

}

// trợ giúp

function showAnswer(){

if(!helpAnswer){
alert("Bạn đã dùng trợ giúp này rồi")
return
}

helpAnswer=false

alert("Đáp án đúng: "+questions[current].a[questions[current].c])

}

function audience(){

if(!helpAudience){
alert("Bạn đã dùng trợ giúp này rồi")
return
}

helpAudience=false

let correct=questions[current].c

let percent=[0,0,0,0]

percent[correct]=Math.floor(Math.random()*30)+40

for(let i=0;i<4;i++){

if(i!=correct){

percent[i]=Math.floor(Math.random()*20)

}

}

alert(
"A:"+percent[0]+"%\n"+
"B:"+percent[1]+"%\n"+
"C:"+percent[2]+"%\n"+
"D:"+percent[3]+"%"
)

}

function callFriend(){

if(!helpCall){
alert("Bạn đã dùng trợ giúp này rồi")
return
}

helpCall=false

let correct=questions[current].c

let guess=Math.random()<0.875?correct:Math.floor(Math.random()*4)

alert("Người thân đã tra GG và có đáp án: "+questions[current].a[guess])

}

function skip(){

if(!helpSkip){
alert("Bạn đã dùng trợ giúp này rồi")
return
}


helpSkip=false

nextQuestion()

}

</script>
