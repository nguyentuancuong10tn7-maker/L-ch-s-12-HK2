<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ôn Tập Lịch Sử 12 – Đối Ngoại & Hồ Chí Minh</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #c0392b;
    --gold: #d4a017;
    --dark: #1a1208;
    --cream: #fdf6e3;
    --paper: #f5ead0;
    --ink: #2c1a0e;
    --accent: #8b2500;
    --success: #2e7d32;
    --wrong: #b71c1c;
    --neutral: #5d4037;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Be Vietnam Pro', sans-serif;
    background: var(--dark);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* === BACKGROUND PATTERN === */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(212,160,23,0.03) 40px, rgba(212,160,23,0.03) 41px),
      repeating-linear-gradient(-45deg, transparent, transparent 40px, rgba(192,57,43,0.03) 40px, rgba(192,57,43,0.03) 41px);
    pointer-events: none; z-index: 0;
  }

  /* === HEADER === */
  header {
    position: relative; z-index: 10;
    background: linear-gradient(135deg, #7b0000 0%, #c0392b 40%, #8b2500 70%, #4a0000 100%);
    padding: 2.5rem 1.5rem 2rem;
    text-align: center;
    border-bottom: 4px solid var(--gold);
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }

  .star-row {
    color: var(--gold);
    font-size: 1.2rem;
    letter-spacing: 0.5rem;
    margin-bottom: 0.6rem;
    opacity: 0.9;
    animation: shimmer 3s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%,100%{opacity:0.7} 50%{opacity:1}
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    color: #fff;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
    line-height: 1.3;
    letter-spacing: 0.02em;
  }

  header p {
    color: rgba(255,255,255,0.75);
    font-size: 0.85rem;
    margin-top: 0.5rem;
    font-weight: 300;
  }

  /* === SCORE BAR === */
  #score-bar {
    position: sticky; top: 0; z-index: 50;
    background: var(--dark);
    border-bottom: 2px solid var(--gold);
    padding: 0.7rem 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
    gap: 1rem;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  .score-info {
    font-size: 0.85rem;
    color: var(--gold);
    font-weight: 600;
  }

  .progress-wrap {
    flex: 1;
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    height: 8px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), #f9d342);
    border-radius: 20px;
    transition: width 0.5s ease;
    width: 0%;
  }

  #reset-btn, #shuffle-btn {
    background: transparent;
    border: 1.5px solid var(--gold);
    color: var(--gold);
    padding: 0.3rem 0.9rem;
    border-radius: 20px;
    font-size: 0.75rem;
    font-family: 'Be Vietnam Pro', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  #reset-btn:hover { background: var(--gold); color: var(--dark); }

  #shuffle-btn.on {
    background: var(--gold);
    color: var(--dark);
    font-weight: 700;
  }
  #shuffle-btn:hover:not(.on) { background: rgba(212,160,23,0.15); }

  .shuffle-badge {
    display: inline-block;
    background: var(--red);
    color: #fff;
    font-size: 0.62rem;
    font-weight: 700;
    padding: 0.1rem 0.4rem;
    border-radius: 10px;
    margin-left: 0.3rem;
    vertical-align: middle;
    letter-spacing: 0.03em;
  }

  /* === LESSON TABS === */
  .lesson-tabs {
    position: relative; z-index: 5;
    display: flex;
    overflow-x: auto;
    background: rgba(255,255,255,0.04);
    border-bottom: 1px solid rgba(212,160,23,0.3);
    padding: 0 0.5rem;
    gap: 0.2rem;
    scrollbar-width: none;
  }
  .lesson-tabs::-webkit-scrollbar { display: none; }

  .tab-btn {
    flex-shrink: 0;
    padding: 0.75rem 1rem;
    background: transparent;
    border: none;
    color: rgba(253,246,227,0.5);
    font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .tab-btn.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  .tab-btn:hover:not(.active) {
    color: var(--cream);
  }

  /* === MAIN CONTENT === */
  main {
    position: relative; z-index: 5;
    max-width: 800px;
    margin: 0 auto;
    padding: 1.5rem 1rem 4rem;
  }

  .lesson-panel { display: none; }
  .lesson-panel.active { display: block; }

  /* === SECTION TITLE === */
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    color: var(--gold);
    margin: 1.8rem 0 1rem;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid rgba(212,160,23,0.3);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .section-title::before {
    content: '❧';
    font-size: 1rem;
    opacity: 0.7;
  }

  /* === QUESTION CARD === */
  .q-card {
    background: var(--paper);
    border-radius: 12px;
    margin-bottom: 1.2rem;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    border: 1px solid rgba(212,160,23,0.2);
    transition: transform 0.15s;
    animation: fadeUp 0.4s ease both;
  }

  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .q-header {
    background: linear-gradient(135deg, rgba(139,37,0,0.15), rgba(192,57,43,0.08));
    padding: 0.9rem 1rem 0.75rem;
    display: flex;
    gap: 0.75rem;
    align-items: flex-start;
    border-bottom: 1px solid rgba(212,160,23,0.15);
  }

  .q-num {
    background: var(--red);
    color: #fff;
    border-radius: 50%;
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .q-text {
    font-size: 0.9rem;
    line-height: 1.6;
    color: var(--ink);
    font-weight: 500;
  }

  /* === SOURCE BLOCK === */
  .q-source {
    background: rgba(139,37,0,0.06);
    border-left: 3px solid var(--gold);
    margin: 0.5rem 1rem 0.2rem;
    padding: 0.6rem 0.8rem;
    font-size: 0.8rem;
    color: var(--neutral);
    font-style: italic;
    line-height: 1.5;
    border-radius: 0 6px 6px 0;
  }

  /* === OPTIONS === */
  .q-options {
    padding: 0.75rem 1rem 1rem;
    display: grid;
    gap: 0.5rem;
  }

  .opt-btn {
    width: 100%;
    text-align: left;
    padding: 0.65rem 0.85rem;
    border-radius: 8px;
    border: 1.5px solid rgba(139,37,0,0.2);
    background: rgba(255,255,255,0.6);
    color: var(--ink);
    font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 0.84rem;
    line-height: 1.4;
    cursor: pointer;
    transition: all 0.18s;
    position: relative;
    font-weight: 400;
  }

  .opt-btn:hover:not(:disabled) {
    border-color: var(--red);
    background: rgba(192,57,43,0.08);
    transform: translateX(3px);
  }

  .opt-btn.correct {
    background: rgba(46,125,50,0.12);
    border-color: var(--success);
    color: #1b5e20;
    font-weight: 600;
  }

  .opt-btn.wrong {
    background: rgba(183,28,28,0.1);
    border-color: var(--wrong);
    color: #b71c1c;
    text-decoration: line-through;
    opacity: 0.8;
  }

  .opt-btn:disabled { cursor: default; transform: none !important; }

  /* === TRUE/FALSE === */
  .tf-list {
    padding: 0.5rem 1rem 1rem;
    display: grid;
    gap: 0.7rem;
  }

  .tf-item {
    background: rgba(255,255,255,0.55);
    border: 1.5px solid rgba(139,37,0,0.15);
    border-radius: 8px;
    padding: 0.7rem 0.85rem;
    display: flex;
    gap: 0.6rem;
    align-items: flex-start;
  }

  .tf-label {
    font-weight: 700;
    font-size: 0.85rem;
    color: var(--red);
    min-width: 16px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .tf-text {
    font-size: 0.83rem;
    line-height: 1.5;
    color: var(--ink);
    flex: 1;
  }

  .tf-btns {
    display: flex;
    gap: 0.4rem;
    margin-top: 0.5rem;
  }

  .tf-btn {
    padding: 0.28rem 0.75rem;
    border-radius: 20px;
    border: 1.5px solid;
    font-size: 0.75rem;
    font-family: 'Be Vietnam Pro', sans-serif;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.15s;
  }

  .tf-btn.dung  { border-color: var(--success); color: var(--success); background: transparent; }
  .tf-btn.sai   { border-color: var(--wrong);   color: var(--wrong);   background: transparent; }

  .tf-btn.dung:hover:not(:disabled)  { background: var(--success); color: #fff; }
  .tf-btn.sai:hover:not(:disabled)   { background: var(--wrong);   color: #fff; }

  .tf-btn:disabled { cursor: default; }

  .tf-btn.selected-correct { background: var(--success); color: #fff; }
  .tf-btn.selected-wrong-pick { background: var(--wrong); color: #fff; }
  .tf-btn.show-correct { background: var(--success); color: #fff; border-color: var(--success); }

  .tf-result {
    font-size: 0.75rem;
    margin-top: 0.35rem;
    font-weight: 600;
  }
  .tf-result.ok  { color: var(--success); }
  .tf-result.bad { color: var(--wrong); }

  /* === FEEDBACK === */
  .feedback {
    margin: 0 1rem 0.8rem;
    padding: 0.5rem 0.75rem;
    border-radius: 8px;
    font-size: 0.82rem;
    font-weight: 600;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.ok  { background: rgba(46,125,50,0.12); color: var(--success); border: 1px solid rgba(46,125,50,0.3); }
  .feedback.bad { background: rgba(183,28,28,0.1);  color: var(--wrong);   border: 1px solid rgba(183,28,28,0.3); }

  /* === LESSON SUMMARY === */
  .lesson-score {
    background: linear-gradient(135deg, rgba(212,160,23,0.15), rgba(192,57,43,0.1));
    border: 1px solid var(--gold);
    border-radius: 12px;
    padding: 1rem 1.2rem;
    margin-bottom: 1.5rem;
    text-align: center;
    font-size: 0.88rem;
    color: var(--ink);
  }

  .lesson-score strong { color: var(--red); font-size: 1.1rem; }

  /* === SCROLLBAR === */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--dark); }
  ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="star-row">★ ★ ★ ★ ★</div>
  <h1>Ôn Tập Lịch Sử 12<br>Chủ Đề 5 &amp; 6</h1>
  <p>Đối ngoại Việt Nam • Hồ Chí Minh trong lịch sử</p>
</header>

<div id="score-bar">
  <span class="score-info" id="score-label">0 / 0</span>
  <div class="progress-wrap"><div class="progress-fill" id="progress-fill"></div></div>
  <button id="shuffle-btn" onclick="toggleShuffle()">🔀 Ngẫu nhiên</button>
  <button id="reset-btn" onclick="resetAll()">↺ Làm lại</button>
</div>

<div class="lesson-tabs" id="lesson-tabs">
  <button class="tab-btn active" onclick="switchLesson(0)">Bài 12</button>
  <button class="tab-btn" onclick="switchLesson(1)">Bài 13</button>
  <button class="tab-btn" onclick="switchLesson(2)">Bài 14</button>
  <button class="tab-btn" onclick="switchLesson(3)">Bài 15</button>
  <button class="tab-btn" onclick="switchLesson(4)">Bài 16</button>
</div>

<main id="main"></main>

<script>
// ============================================================
// DATA
// ============================================================
const lessons = [
// ---- BÀI 12 ----
{
  title: "Bài 12 – Đối ngoại trong đấu tranh giành độc lập (Đầu TK XX – 1945)",
  mcq: [
    { q: "Trong thời gian hoạt động tại Trung Quốc (1912), Phan Bội Châu tham gia thành lập tổ chức nào?", opts: ["Việt Nam Quang phục hội","Việt Nam Quốc Dân Đảng","Đông Á đồng minh","Hội Liên hiệp thuộc địa"], ans: 0 },
    { q: "Hoạt động đối ngoại của Phan Châu Trinh (đầu TK XX) diễn ra ở quốc gia nào?", opts: ["Pháp","Liên Xô","Nhật Bản","Trung Quốc"], ans: 0 },
    { q: "Trong những năm 1911–1922, hoạt động đối ngoại của Nguyễn Ái Quốc ở đâu?", opts: ["Pháp","Nhật Bản","Liên Xô","Trung Quốc"], ans: 0 },
    { q: "Tại Pháp (1920), Nguyễn Ái Quốc tham gia sáng lập tổ chức nào?", opts: ["Đảng Cộng sản Pháp","Đảng Cộng sản Liên Xô","Việt Nam Quang phục hội","Tân Việt Cách mạng đảng"], ans: 0 },
    { q: "Năm 1924, tại Quảng Châu, Nguyễn Ái Quốc liên lạc với lực lượng cách mạng khu vực nào?", opts: ["Đông Nam Á","Mĩ La-tinh","Bắc Phi","Tây Nam Á"], ans: 0 },
    { q: "Hoạt động đối ngoại của Đảng CS Đông Dương (1930–1945) chủ yếu nhằm mục đích gì?", opts: ["Phục vụ đấu tranh chống thực dân, phát xít giành độc lập","Phục vụ quan hệ ngoại giao với các nước lớn","Tìm kiếm liên minh quân sự với cường quốc","Liên kết với các nước phương Tây chống đế quốc"], ans: 0 },
    { q: "Nội dung nào KHÔNG đúng về hoạt động đối ngoại của Đảng CS Đông Dương (1930–1945)?", opts: ["Tham gia các khối quân sự chống phát xít","Củng cố quan hệ với Đảng CS Trung Quốc","Tổ chức nhiều hoạt động ủng hộ Liên Xô","Liên lạc với phong trào chống quân phiệt Nhật"], ans: 0 },
    { q: "Trong CTTG II (1939–1945), Đảng CS Đông Dương đưa ra chủ trương đối ngoại nào?", opts: ["Đứng về phía phe đồng minh chống phát xít","Liên minh quân sự với các quốc gia Đông Nam Á","Triển khai hoạt động giúp đỡ các nước bại trận","Thành lập liên minh chống chiến tranh ở Đông Dương"], ans: 0 },
    { q: "Phan Bội Châu thành lập Việt Nam Quang phục hội (1912) nhằm mục đích gì?", opts: ["Đánh Pháp giành độc lập, thành lập nước Cộng hòa Dân quốc Việt Nam","Đánh Mĩ giành độc lập, thành lập nước Cộng hòa Dân quốc Việt Nam","Đánh Pháp giành độc lập, thành lập nước Việt Nam Dân chủ Cộng hòa","Tiến hành cải cách đất nước, lập ra nhà nước Việt Nam Dân chủ Cộng hòa"], ans: 0 },
    { q: "Hoạt động của Phan Châu Trinh tại Pháp (đầu TK XX) nhằm mục đích gì?", opts: ["Vận động cải cách cho Việt Nam","Thiết lập quan hệ với nước Pháp","Nhờ Pháp để đánh đuổi Nhật","Vận động trao trả độc lập cho Việt Nam"], ans: 0 },
    { q: "Mục đích của Hội Liên hiệp thuộc địa (Nguyễn Ái Quốc sáng lập, 1921) là gì?", opts: ["Đoàn kết các lực lượng cách mạng chống chủ nghĩa thực dân","Liên minh với nước tư bản để chống thực dân","Lãnh đạo phong trào công nhân ở các nước tư bản","Đào tạo thanh niên thuộc địa đưa về nước hoạt động"], ans: 0 },
    { q: "Hoạt động đối ngoại của Nguyễn Ái Quốc ở Liên Xô (1923–1924) xác lập mối quan hệ giữa cách mạng Việt Nam với?", opts: ["Quốc tế Cộng sản và cách mạng thế giới","Phong trào cách mạng ở Mỹ La-tinh","Cách mạng Lào và các nước Đông Âu","Hệ thống các nước xã hội chủ nghĩa"], ans: 0 },
    { q: "Phong trào Đông Du (1905–1908) để lại bài học gì cho Việt Nam hiện nay?", opts: ["Tranh thủ ngoại lực, phát huy sức mạnh nội lực","Nói đi đôi với làm, không ngừng rèn luyện","Vừa học vừa làm phụng sự gia đình và xã hội","Dám nói, dám làm và dám chịu trách nhiệm"], ans: 0 },
    { q: "Hoạt động đối ngoại của Nguyễn Ái Quốc (1911–1930) để lại bài học gì cho thế hệ trẻ?", opts: ["Nghị lực và bản lĩnh, rèn luyện ý chí quyết tâm","Coi ngoại lực là động lực chủ yếu để phát triển","Kết hợp tiến bộ nhân loại với giá trị bản thân","Đề cao cá nhân và vươn tầm ảnh hưởng ra thế giới"], ans: 0 },
  ],
  tf: [
    {
      source: "Phan Bội Châu là người đã khởi xướng phong trào Đông Du, mở đầu mối quan hệ Việt Nam – Nhật Bản đầu TK XX. Mục đích: đưa thanh niên ưu tú sang học tập tại Tokyo, đào tạo nhân tài, tiến kịp văn minh thế giới.",
      items: [
        { label: "a", text: "Phan Bội Châu là người khởi đầu cho mối quan hệ giữa Việt Nam với Nhật Bản trong những năm đầu của thế kỉ XX.", ans: true },
        { label: "b", text: "Mục đích của phong trào Đông Du là đưa thanh niên Việt Nam sang học tập ở Nhật Bản sau đó đưa về nước hoạt động đấu tranh giành độc lập.", ans: true },
        { label: "c", text: "Chủ trương cứu nước của Phan Bội Châu là bất bạo động, dựa vào Nhật Bản để vận động cải cách cứu nước.", ans: false },
        { label: "d", text: "Chủ trương cứu nước của Phan Bội Châu đặt nền tảng cho Nguyễn Ái Quốc lựa chọn con đường cứu nước đúng đắn sau này.", ans: true },
      ]
    },
    {
      source: "1930–1945: Đảng CS Đông Dương nhằm xác lập quan hệ với các Đảng cộng sản và phong trào vô sản thế giới. Mặt trận Việt Minh và Hồ Chí Minh tiếp xúc với người Mỹ, tìm kiếm giải pháp cho vấn đề Đông Dương.",
      items: [
        { label: "a", text: "Hoạt động đối ngoại của Đảng CS Đông Dương (1930–1945) nhằm mở rộng quan hệ với lực lượng phát xít ở Đông Nam Á.", ans: false },

// ============================================================
// SHUFFLE HELPERS
// ============================================================
let shuffleMode = false;
// shuffleMap[li][qi] = { qOrder: [...], optOrder: [...] }
// qOrder: shuffled indices of mcq questions for lesson li
// optOrder[qi]: shuffled option indices for question qi
let shuffleMap = {};

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildShuffleMap() {
  shuffleMap = {};
  lessons.forEach((lesson, li) => {
    const qOrder = shuffleArray(lesson.mcq.map((_, i) => i));
    const optOrder = {};
    lesson.mcq.forEach((q, qi) => {
      optOrder[qi] = shuffleArray(q.opts.map((_, i) => i));
    });
    shuffleMap[li] = { qOrder, optOrder };
  });
}

function toggleShuffle() {
  shuffleMode = !shuffleMode;
  const btn = document.getElementById('shuffle-btn');
  if (shuffleMode) {
    btn.classList.add('on');
    btn.textContent = '🔀 Ngẫu nhiên  ✓';
    buildShuffleMap();
  } else {
    btn.classList.remove('on');
    btn.textContent = '🔀 Ngẫu nhiên';
  }
  // Reset state and re-render so shuffle applies cleanly
  state = {};
  updateScoreBar();
  render();
}

// ============================================================
// STATE
// ============================================================
let state = {};
// state[lessonIdx][type][idx] = { answered, correct }
// For MCQ in shuffle mode, idx is the ORIGINAL question index (stable key)

function getKey(lesson, type, idx) { return `${lesson}_${type}_${idx}`; }

function initState() {
  state = {};
  shuffleMode = false;
  const btn = document.getElementById('shuffle-btn');
  if (btn) { btn.classList.remove('on'); btn.textContent = '🔀 Ngẫu nhiên'; }
  updateScoreBar();
}

function answered(lessonIdx, type, idx) {
  return !!state[getKey(lessonIdx, type, idx)];
}

function isCorrect(lessonIdx, type, idx) {
  return state[getKey(lessonIdx, type, idx)]?.correct;
}

function record(lessonIdx, type, idx, correct) {
  const k = getKey(lessonIdx, type, idx);
  if (!state[k]) {
    state[k] = { correct };
    updateScoreBar();
  }
}

function totalItems() {
  let t = 0;
  lessons.forEach(l => {
    t += l.mcq.length;
    l.tf.forEach(q => { t += q.items.length; });
  });
  return t;
}

function answeredItems() {
  return Object.keys(state).length;
}

function correctItems() {
  return Object.values(state).filter(v => v.correct).length;
}

function updateScoreBar() {
  const total = totalItems();
  const done = answeredItems();
  const correct = correctItems();
  document.getElementById('score-label').textContent = `${correct} / ${done} đúng`;
  const pct = total ? (done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
}

// ============================================================
// RENDER
// ============================================================
let currentLesson = 0;

function render() {
  const main = document.getElementById('main');
  main.innerHTML = '';

  lessons.forEach((lesson, li) => {
    const panel = document.createElement('div');
    panel.className = 'lesson-panel' + (li === currentLesson ? ' active' : '');
    panel.id = `lesson-${li}`;

    // MCQ section
    const mcqTitle = document.createElement('div');
    mcqTitle.className = 'section-title';
    mcqTitle.textContent = 'Trắc nghiệm nhiều lựa chọn';
    if (shuffleMode) {
      const badge = document.createElement('span');
      badge.className = 'shuffle-badge';
      badge.textContent = 'NGẪU NHIÊN';
      mcqTitle.appendChild(badge);
    }
    panel.appendChild(mcqTitle);

    // Determine question order
    const qOrder = (shuffleMode && shuffleMap[li])
      ? shuffleMap[li].qOrder
      : lesson.mcq.map((_, i) => i);

    qOrder.forEach((origQi, displayIdx) => {
      const q = lesson.mcq[origQi];
      // Determine option order
      const optOrder = (shuffleMode && shuffleMap[li])
        ? shuffleMap[li].optOrder[origQi]
        : q.opts.map((_, i) => i);
      panel.appendChild(buildMCQ(li, origQi, displayIdx, q, optOrder));
    });

    // TF section
    if (lesson.tf.length > 0) {
      const tfTitle = document.createElement('div');
      tfTitle.className = 'section-title';
      tfTitle.textContent = 'Trắc nghiệm đúng – sai';
      panel.appendChild(tfTitle);

      lesson.tf.forEach((tfq, ti) => {
        panel.appendChild(buildTF(li, ti, tfq));
      });
    }

    main.appendChild(panel);
  });
}

function buildMCQ(li, origQi, displayIdx, q, optOrder) {
  const card = document.createElement('div');
  card.className = 'q-card';
  card.style.animationDelay = (displayIdx * 0.04) + 's';
  card.id = `mcq-${li}-${origQi}`;

  const header = document.createElement('div');
  header.className = 'q-header';

  const num = document.createElement('div');
  num.className = 'q-num';
  num.textContent = displayIdx + 1;

  const text = document.createElement('div');
  text.className = 'q-text';
  text.textContent = q.q;

  header.appendChild(num);
  header.appendChild(text);
  card.appendChild(header);

  const opts = document.createElement('div');
  opts.className = 'q-options';

  // optOrder is array of original option indices in display order
  // We need to find: what display position does the correct answer (q.ans) appear at?
  const correctDisplayPos = optOrder.indexOf(q.ans);

  optOrder.forEach((origOi, displayOi) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = String.fromCharCode(65 + displayOi) + '. ' + q.opts[origOi];
    btn.dataset.origOi = origOi;

    // onclick: pass the DISPLAY position of correct answer
    btn.onclick = () => handleMCQ(li, origQi, displayOi, correctDisplayPos, card, origOi, q.ans);

    if (answered(li, 'mcq', origQi)) {
      btn.disabled = true;
      // Highlight correct option in display
      if (origOi === q.ans) btn.classList.add('correct');
      // Highlight wrong pick
      if (!isCorrect(li, 'mcq', origQi) && state[getKey(li,'mcq',origQi)]?.picked === origOi) {
        btn.classList.add('wrong');
      }
    }
    opts.appendChild(btn);
  });

  card.appendChild(opts);

  const fb = document.createElement('div');
  fb.className = 'feedback';
  if (answered(li, 'mcq', origQi)) {
    fb.classList.add('show');
    if (isCorrect(li, 'mcq', origQi)) {
      fb.classList.add('ok');
      fb.textContent = '✓ Chính xác!';
    } else {
      const correctLetter = String.fromCharCode(65 + correctDisplayPos);
      fb.classList.add('bad');
      fb.textContent = `✗ Sai rồi! Đáp án đúng là: ${correctLetter}. ${q.opts[q.ans]}`;
    }
  }
  card.appendChild(fb);

  return card;
}

function handleMCQ(li, origQi, chosenDisplayPos, correctDisplayPos, card, chosenOrigOi, correctOrigOi) {
  if (answered(li, 'mcq', origQi)) return;
  const isRight = chosenOrigOi === correctOrigOi;
  // Store picked original option index for re-render highlight
  state[getKey(li, 'mcq', origQi)] = { correct: isRight, picked: chosenOrigOi };
  updateScoreBar();

  const btns = card.querySelectorAll('.opt-btn');
  btns.forEach((btn) => {
    btn.disabled = true;
    const origOi = parseInt(btn.dataset.origOi);
    if (origOi === correctOrigOi) btn.classList.add('correct');
    else if (origOi === chosenOrigOi && !isRight) btn.classList.add('wrong');
  });

  const fb = card.querySelector('.feedback');
  fb.classList.add('show');
  if (isRight) {
    fb.classList.add('ok');
    fb.textContent = '✓ Chính xác!';
  } else {
    const correctLetter = String.fromCharCode(65 + correctDisplayPos);
    fb.classList.add('bad');
    fb.textContent = `✗ Sai rồi! Đáp án đúng là: ${correctLetter}.`;
  }
}

function buildTF(li, ti, tfq) {
  const card = document.createElement('div');
  card.className = 'q-card';
  card.style.animationDelay = (ti * 0.06) + 's';
  card.id = `tf-${li}-${ti}`;

  const header = document.createElement('div');
  header.className = 'q-header';
  const num = document.createElement('div');
  num.className = 'q-num';
  num.textContent = 'TL';
  num.style.background = '#5d4037';
  const text = document.createElement('div');
  text.className = 'q-text';
  text.textContent = `Câu hỏi đúng – sai ${ti + 1}`;
  header.appendChild(num);
  header.appendChild(text);
  card.appendChild(header);

  const src = document.createElement('div');
  src.className = 'q-source';
  src.textContent = tfq.source;
  card.appendChild(src);

  const list = document.createElement('div');
  list.className = 'tf-list';

  tfq.items.forEach((item, ii) => {
    const row = document.createElement('div');
    row.className = 'tf-item';

    const lbl = document.createElement('div');
    lbl.className = 'tf-label';
    lbl.textContent = item.label + ')';

    const right = document.createElement('div');
    right.style.flex = '1';

    const txt = document.createElement('div');
    txt.className = 'tf-text';
    txt.textContent = item.text;

    const btns = document.createElement('div');
    btns.className = 'tf-btns';

    const dBtn = document.createElement('button');
    dBtn.className = 'tf-btn dung';
    dBtn.textContent = '✓ Đúng';

    const sBtn = document.createElement('button');
    sBtn.className = 'tf-btn sai';
    sBtn.textContent = '✗ Sai';

    const result = document.createElement('div');
    result.className = 'tf-result';

    const stateKey = `tf_${ti}_${ii}`;
    if (answered(li, stateKey, 0)) {
      dBtn.disabled = true;
      sBtn.disabled = true;
      const wasRight = isCorrect(li, stateKey, 0);
      if (item.ans) {
        dBtn.classList.add('selected-correct');
        if (!wasRight) { sBtn.classList.add('selected-wrong-pick'); }
      } else {
        sBtn.classList.add('selected-correct');
        if (!wasRight) { dBtn.classList.add('selected-wrong-pick'); }
      }
      result.className = 'tf-result ' + (wasRight ? 'ok' : 'bad');
      result.textContent = wasRight ? '✓ Đúng!' : ('✗ Sai! Đáp án: ' + (item.ans ? 'Đúng' : 'Sai'));
    }

    dBtn.onclick = () => handleTF(li, ti, ii, true, item.ans, dBtn, sBtn, result);
    sBtn.onclick = () => handleTF(li, ti, ii, false, item.ans, dBtn, sBtn, result);

    btns.appendChild(dBtn);
    btns.appendChild(sBtn);

    right.appendChild(txt);
    right.appendChild(btns);
    right.appendChild(result);

    row.appendChild(lbl);
    row.appendChild(right);
    list.appendChild(row);
  });

  card.appendChild(list);
  return card;
}

function handleTF(li, ti, ii, chosen, correct, dBtn, sBtn, result) {
  const stateKey = `tf_${ti}_${ii}`;
  if (answered(li, stateKey, 0)) return;
  const isRight = chosen === correct;
  record(li, stateKey, 0, isRight);

  dBtn.disabled = true;
  sBtn.disabled = true;

  if (correct) { dBtn.classList.add('show-correct'); }
  else { sBtn.classList.add('show-correct'); }

  if (!isRight) {
    if (chosen) dBtn.classList.add('selected-wrong-pick');
    else sBtn.classList.add('selected-wrong-pick');
  }

  result.className = 'tf-result ' + (isRight ? 'ok' : 'bad');
  result.textContent = isRight ? '✓ Đúng!' : ('✗ Sai! Đáp án: ' + (correct ? 'Đúng' : 'Sai'));
}

// ============================================================
// TAB / RESET
// ============================================================
function switchLesson(idx) {
  currentLesson = idx;
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === idx);
  });
  document.querySelectorAll('.lesson-panel').forEach((panel, i) => {
    panel.classList.toggle('active', i === idx);
  });
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetAll() {
  if (!confirm('Bạn có chắc muốn làm lại tất cả câu hỏi không?')) return;
  shuffleMap = {};
  initState();
  render();
  switchLesson(0);
}

// ============================================================
// INIT
// ============================================================
initState();
render();
</script>
